# SOURCE OF TRUTH — this file is mirrored FROM the app repo (offsite/sentinel/) TO the
# stock-cockpit-sentinel repo. Edit it here, then mirror to the sentinel repo on change.
#
# HOLE 1 — off-server audit-ledger head anchor. PULL-based: this scheduled workflow fetches the app's
# PUBLIC /api/audit/anchor endpoint and COMMITS the head hash into git. GitHub's commit history is an
# off-Railway, append-only-in-practice, tamper-evident store — deleting rows from Railway/Postgres
# cannot delete these commits. Uses ONLY the automatic GITHUB_TOKEN (zero new secret on Railway).
# The committed file holds ONLY a sha256 hash, a count, and timestamps — no positions, no keys, no code.
#
# LOG DISCIPLINE: workflow logs are PUBLIC. This job only prints status words + a seq number. It never
# echoes secrets (there are none) and only ever handles head-hash metadata.
#
# NOTE: broker-native bracket stops remain the PRIMARY protective net; this anchor is a tamper-evidence
# layer, not a control. The every-30-min commit also keeps the repo "active", which prevents GitHub's
# 60-day auto-disable of scheduled workflows (keeping the Hole-2 dead-man's schedule alive too).
#
# SELF-HEAL GUARD (pre-live audit fix): before overwriting anchors/latest.json this job compares the new
# head against the previously anchored one. If the new head is BEHIND already-anchored history — count
# shrank, headSeq went backwards, or the same seq now carries a different hash — it does NOT overwrite
# latest.json (so /api/audit/verify-anchor keeps flagging TRUNCATED/REWRITTEN forever, not just for one
# cycle), writes an anchors/ALERT-*.json, and EXITS 1. A failing scheduled workflow emails the repo owner
# — an off-server truncation alarm with zero new secrets. The canonical rule is src/audit/anchorVerify.js
# `anchorRegressed` in the app repo; the jq below mirrors it (grep-tested for drift).
name: anchor
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min. GitHub cron is best-effort — runs may be 5-20 min late.
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: sentinel-commit     # serialize with the dead-man's state commits (Hole 2) to avoid push races
  cancel-in-progress: false
jobs:
  anchor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch + commit the ledger head anchor
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -euo pipefail
          URL="${APP_URL:-https://web-production-0b611.up.railway.app}"

          # Fetch the public head. On ANY fetch failure, exit 0 WITHOUT a commit — the dead-man workflow
          # (Hole 2) owns downtime alerting; the anchor must never spam on a transient outage.
          if ! BODY="$(curl -fsS --max-time 20 "$URL/api/audit/anchor")"; then
            echo "anchor fetch failed — skipping this run (no commit)"; exit 0
          fi
          if [ "$(printf '%s' "$BODY" | jq -r '.ok')" != "true" ]; then
            echo "anchor endpoint returned ok!=true — skipping (no commit)"; exit 0
          fi

          STAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SEQ="$(printf '%s' "$BODY" | jq -r '.headSeq')"
          mkdir -p anchors

          git config user.name  "stock-cockpit-sentinel"
          git config user.email "sentinel@users.noreply.github.com"

          # SELF-HEAL GUARD — mirrors src/audit/anchorVerify.js `anchorRegressed`. Compare the new head to
          # the previously anchored one. A missing/unparseable previous file = bootstrap (verdict "ok").
          VERDICT="ok"
          if [ -f anchors/latest.json ]; then
            VERDICT="$(jq -n --argjson new "$BODY" --slurpfile old anchors/latest.json '
              ($old[0] // {}) as $o
              | (($new.count   // 0)   | if type=="number" then . else 0 end) as $nc
              | (($o.count     // 0)   | if type=="number" then . else 0 end) as $oc
              | (($new.headSeq // 0)   | if type=="number" then . else 0 end) as $ns
              | (($o.headSeq   // 0)   | if type=="number" then . else 0 end) as $os
              | (($new.headHash // "") | tostring) as $nh
              | (($o.headHash   // "") | tostring) as $oh
              | if   $nc < $oc then "count regressed \($oc) -> \($nc)"
                elif $ns < $os then "headSeq regressed \($os) -> \($ns)"
                elif ($ns == $os and $os != 0 and $nh != $oh) then "head hash changed at seq \($os)"
                else "ok" end' 2>/dev/null || echo ok)"
          fi

          if [ "$VERDICT" != "ok" ]; then
            # Already-anchored history moved BACKWARDS = truncation/rewrite. Do NOT overwrite latest.json
            # (keep the higher anchor so verify-anchor keeps flagging the tamper), record an ALERT, fail.
            echo "ANCHOR REGRESSION DETECTED — $VERDICT (latest.json left UNCHANGED)"
            ALERT="anchors/ALERT-$(printf '%s' "$STAMP" | tr ':' '-').json"
            printf '%s' "$BODY" | jq --arg t "$STAMP" --arg v "$VERDICT" \
              '{alert:"ANCHOR_REGRESSION", detail:$v, observedHead:., observedAt:$t}' > "$ALERT"
            git add anchors
            if ! git diff --cached --quiet; then
              git commit -m "ALERT: anchor regression — $VERDICT"
              for i in 1 2 3; do
                if git push; then break; fi
                echo "push failed — rebasing and retrying ($i)"; git pull --rebase --autostash || true
              done
            fi
            echo "failing the run so GitHub emails the owner — off-server truncation alarm"
            exit 1
          fi

          # Monotonic (or first run): record the head. latest.json = fetched head + an anchoredAt stamp.
          printf '%s' "$BODY" | jq --arg t "$STAMP" '. + {anchoredAt:$t}' > anchors/latest.json
          # Append one immutable line to the current month's log.
          printf '%s' "$BODY" | jq -c --arg t "$STAMP" '. + {anchoredAt:$t}' >> "anchors/$(date -u +%Y-%m).ndjson"

          git add anchors
          if git diff --cached --quiet; then
            echo "nothing changed — no commit"; exit 0
          fi
          git commit -m "anchor: seq ${SEQ}"

          # Race with the dead-man's state commits: pull --rebase + retry the push up to 3x.
          for i in 1 2 3; do
            if git push; then echo "pushed (seq ${SEQ})"; exit 0; fi
            echo "push failed — rebasing and retrying ($i)"; git pull --rebase --autostash || true
          done
          echo "push failed after retries"; exit 1
